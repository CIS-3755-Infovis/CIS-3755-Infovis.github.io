<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
{% include head.html %}
<body class="min-h-screen bg-platformBg text-platformText">
  <div class="absolute inset-x-0 top-0 -z-10 h-[18rem] bg-[linear-gradient(180deg,_#eef4ff_0%,_#f6f8fc_82%)]"></div>

  <div class="mx-auto flex min-h-screen max-w-7xl flex-col px-4 pb-12 pt-6 sm:px-6 lg:px-8">
    {% include navbar.html %}

    <section class="mt-8 rounded-[1.5rem] border border-platformBorder bg-white p-8 shadow-panel md:p-10">
      <p class="text-sm font-semibold uppercase tracking-[0.2em] text-platformBlue">Temple University • CIS 3755</p>
      <h1 class="mt-4 max-w-3xl font-display text-4xl font-extrabold tracking-tight text-platformText sm:text-5xl">{{ page.title }}</h1>
      <p class="mt-4 max-w-3xl text-base leading-8 text-platformMuted">
        {{ page.description | default: site.description }}
      </p>
    </section>

    <main class="py-8">
      <article class="prose {% if page.wide_content == true %}page-content-wide{% else %}max-w-4xl{% endif %} rounded-[1.5rem] border border-platformBorder bg-white p-8 shadow-panel sm:p-10">
        {{ content }}
      </article>
    </main>
  </div>

  {% include footer.html %}
</body>
</html>
