<article class="overflow-hidden rounded-[1.5rem] border border-white/10 bg-slate-900/80 shadow-soft">
  {% if ack_portrait != nil %}
    <img class="aspect-[4/3] w-full object-cover" src="/img/people/{{ ack_portrait }}" alt="Portrait of {{ ack_name }}">
  {% else %}
    <div class="flex aspect-[4/3] items-end bg-[linear-gradient(135deg,_rgba(157,34,53,0.9),_rgba(23,32,51,0.95))] p-5">
      <p class="text-sm font-semibold uppercase tracking-[0.24em] text-white/80">Course contributor</p>
    </div>
  {% endif %}

  <div class="space-y-2 p-5">
    <p class="text-xs font-semibold uppercase tracking-[0.24em] text-gold">{{ ack_role }}</p>
    <h3 class="text-xl font-bold text-white">
      <a href="{{ ack_url }}" class="transition hover:text-gold">{{ ack_name }}</a>
    </h3>
    {% if ack_desc and ack_desc != "" %}
      <p class="text-sm leading-6 text-slate-300">{{ ack_desc }}</p>
    {% endif %}
  </div>
</article>
